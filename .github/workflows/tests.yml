name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['11.*', '12.*', '13.*']
        exclude:
          # Laravel 13 requires PHP 8.3+.
          - laravel: '13.*'
            php: '8.2'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, intl
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-
            composer-${{ runner.os }}-php${{ matrix.php }}-

      - name: Install dependencies
        run: |
          # Allow install when transitive Laravel versions have open advisories.
          # CI runs compat tests against the full supported range; consumers can
          # decide their own policy.
          composer config --no-plugins policy.advisories.block false
          composer update --with "illuminate/support:${{ matrix.laravel }}" \
            --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Show resolved versions
        # illuminate/support is `replace`d by laravel/framework, so it doesn't
        # show up as an installed package. Query laravel/framework instead.
        # `|| true` keeps this debug step from ever blocking the test step.
        run: composer show | grep -E '^(laravel/framework|orchestra/testbench|phpunit/phpunit) ' || true

      - name: Execute tests
        run: vendor/bin/phpunit
